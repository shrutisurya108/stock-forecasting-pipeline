# ──────────────────────────────────────────────────────────────────────────────
# daily_retrain.yml
# Runs the full forecasting pipeline every day at 01:00 UTC.
# Also supports manual triggering from the GitHub Actions UI.
#
# Key design: GitHub Actions always runs in a fresh container.
# Saved models are stored in S3 after each full run, then restored
# at the start of the next run so we can skip retraining when possible.
# ──────────────────────────────────────────────────────────────────────────────

name: Daily Retrain Pipeline

on:
  schedule:
    - cron: "0 1 * * *"

  workflow_dispatch:
    inputs:
      mode:
        description: "Pipeline mode"
        required: true
        default: "full"
        type: choice
        options:
          - full
          - forecast_only
          - single
      ticker:
        description: "Ticker for single mode (e.g. AAPL)"
        required: false
        default: "AAPL"
      fast:
        description: "Use 5 LSTM epochs (smoke-test speed)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  retrain:
    name: Run forecasting pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── Restore saved models from S3 ────────────────────────────────────────
      # GitHub Actions containers are ephemeral — no models persist between runs.
      # We store trained models in S3 after each full run, and restore them here
      # so subsequent runs can use forecast_only mode instead of retraining.
      - name: Restore models from S3
        id: restore
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION:            ${{ secrets.AWS_REGION }}
          S3_BUCKET_NAME:        ${{ secrets.S3_BUCKET_NAME }}
        run: |
          python3 scripts/restore_models.py
          if [ -f ".models_restored" ]; then
            echo "has_models=true" >> $GITHUB_OUTPUT
            echo "✅ Models restored from S3"
          else
            echo "has_models=false" >> $GITHUB_OUTPUT
            echo "ℹ️  No saved models in S3 — will run full training"
          fi
        continue-on-error: true

      # ── Determine final mode ─────────────────────────────────────────────────
      - name: Resolve pipeline mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            # Scheduled: always do full retrain to keep models fresh
            echo "mode=full"     >> $GITHUB_OUTPUT
            echo "ticker="       >> $GITHUB_OUTPUT
            echo "fast=false"    >> $GITHUB_OUTPUT
          else
            REQUESTED="${{ github.event.inputs.mode }}"
            HAS_MODELS="${{ steps.restore.outputs.has_models }}"

            # If forecast_only was requested but no models exist, promote to full
            if [ "$REQUESTED" = "forecast_only" ] && [ "$HAS_MODELS" != "true" ]; then
              echo "⚠️  forecast_only requested but no saved models found — promoting to full"
              echo "mode=full"   >> $GITHUB_OUTPUT
            else
              echo "mode=$REQUESTED" >> $GITHUB_OUTPUT
            fi
            echo "ticker=${{ github.event.inputs.ticker }}" >> $GITHUB_OUTPUT
            echo "fast=${{ github.event.inputs.fast }}"     >> $GITHUB_OUTPUT
          fi

      # ── Run the pipeline ─────────────────────────────────────────────────────
      - name: Run pipeline — ${{ steps.mode.outputs.mode }} mode
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION:            ${{ secrets.AWS_REGION }}
          S3_BUCKET_NAME:        ${{ secrets.S3_BUCKET_NAME }}
          LOG_LEVEL:             "INFO"
        run: |
          MODE="${{ steps.mode.outputs.mode }}"
          TICKER="${{ steps.mode.outputs.ticker }}"
          FAST="${{ steps.mode.outputs.fast }}"

          CMD="python -m pipeline.run_pipeline --mode $MODE"

          if [ "$MODE" = "single" ] && [ -n "$TICKER" ]; then
            CMD="$CMD --ticker $TICKER"
          fi

          if [ "$FAST" = "true" ]; then
            CMD="$CMD --fast"
          fi

          echo "Running: $CMD"
          $CMD

      - name: Upload run logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_id }}
          path: logs/
          retention-days: 7

      - name: Upload predictions
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: predictions-${{ github.run_id }}
          path: |
            predictions/*.csv
            predictions/*.json
          retention-days: 30

      - name: Write job summary
        if: always()
        run: |
          echo "## 📈 Pipeline Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Mode  | ${{ steps.mode.outputs.mode }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Run ID | ${{ github.run_id }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Timestamp | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
          if [ -f "predictions/benchmark_results.csv" ]; then
            echo "### Benchmark Results" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            cat predictions/benchmark_results.csv >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi
